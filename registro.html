<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Registro de Productos</title>
<link rel="stylesheet" href="css/styles.css">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>

<header>
    <div class="logo">Grupo 9</div>
</header>

<div class="layout">

<aside class="sidebar">
    <nav>
        <ul>
            <li><a href="index.html">Dashboard</a></li>
            <li><a class="active" href="registro.html">Productos</a></li>
        </ul>
    </nav>
</aside>

<main class="main main-center">

<section class="form-container modern-card">
    <h1>Nuevo Producto</h1>
    <p class="form-subtitle">Registra un producto en el sistema</p>

    <div id="mensaje"></div>

    <form id="formRegistro" class="modern-form clean-form">

        <div class="field">
            <label>Nombre del Producto</label>
            <input type="text" id="nombre" placeholder="Ej. Laptop HP">
        </div>

        <div class="field">
            <label>Tipo</label>
            <input type="text" id="tipo" placeholder="Ej. Electrónica">
        </div>

        <div class="field">
            <label>Cantidad</label>
            <input type="number" id="cantidad" placeholder="Ej. 10">
        </div>

        <div class="field">
            <label>Costo ($)</label>
            <input type="number" id="costo" placeholder="Ej. 1500">
        </div>

        <div class="field">
            <label>En Stock</label>
            <select id="stock">
                <option value="">Seleccionar</option>
                <option value="si">Sí</option>
                <option value="no">No</option>
            </select>
        </div>

        <button type="submit" class="btn-modern btn-premium" id="btnSubmit">
            Guardar Producto
        </button>

    </form>
</section>

</main>
</div>

<footer class="footer">
    <p>© 2026 Grupo 9</p>
</footer>

<script src="js/auth.js"></script>
	<script src="js/app.js"></script>

</body>
</html>
